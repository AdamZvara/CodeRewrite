name: Python Package CI with Conda

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      env-archive: ${{ steps.archive-env.outputs.path }}

    steps:
      - uses: actions/checkout@v4

      # Set up Miniconda
      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          environment-file: environment.yml
          activate-environment: myenv
          auto-activate-base: false

      # Install your pip requirements
      - name: Install project requirements
        shell: bash -l {0}
        run: |
          pip install -r requirements.txt
          if [ -f EasyEdit/requirements.txt ]; then
              pip install -r EasyEdit/requirements.txt
          fi

      # Lint code
      - name: Lint with flake8
        shell: bash -l {0}
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      # Archive Conda environment for reuse
      - name: Archive Conda environment
        id: archive-env
        shell: bash -l {0}
        run: |
          conda clean --tarballs --index-cache --packages --yes
          conda pack -n myenv -o myenv.tar.gz
          echo "path=myenv.tar.gz" >> $GITHUB_OUTPUT

      - name: Upload environment artifact
        uses: actions/upload-artifact@v4
        with:
          name: myenv
          path: myenv.tar.gz

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      # Download the environment artifact
      - name: Download environment
        uses: actions/download-artifact@v4
        with:
          name: myenv
          path: ./myenv

      # Extract and activate
      - name: Extract Conda environment
        shell: bash -l {0}
        run: |
          mkdir -p myenv-extracted
          tar -xzf myenv/myenv.tar.gz -C myenv-extracted
          source myenv-extracted/bin/activate

      # Install pip requirements again for test job
      - name: Install project requirements
        shell: bash -l {0}
        run: |
          pip install -r requirements.txt
          if [ -f EasyEdit/requirements.txt ]; then
              pip install -r EasyEdit/requirements.txt
          fi

      # Run tests
      - name: Run pytest
        shell: bash -l {0}
        run: |
          pytest ignore EasyEdit
