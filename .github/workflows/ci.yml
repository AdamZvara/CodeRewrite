name: CI

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting
        run: ruff format --check --exclude EasyEdit .

      - name: Lint
        run: ruff check --exclude EasyEdit .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: coderewrite
        run: pytest tests/
